<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <!-- Handle (behind lens) -->
  <line x1="330" y1="330" x2="470" y2="470" stroke="url(#h)" stroke-width="52" stroke-linecap="round"/>
  <!-- Magnifying glass circle -->
  <circle cx="210" cy="210" r="155" stroke="url(#g)" stroke-width="42" fill="white"/>
  <!-- Glass fill -->
  <circle cx="210" cy="210" r="134" fill="#0ea5e9" fill-opacity="0.08"/>
  <!-- ع letter -->
  <foreignObject x="35" y="35" width="310" height="310">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
      <span style="font-family:'Diwan Thuluth','Geeza Pro','Baghdad','Al Nile',serif;font-size:200px;color:#2563eb;line-height:1;">ع</span>
    </div>
  </foreignObject>
</svg>
