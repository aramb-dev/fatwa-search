<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e3a5f" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Magnifying glass handle (behind lens) -->
  <line x1="340" y1="340" x2="460" y2="460" stroke="url(#handleGrad)" stroke-width="44" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Magnifying glass circle (lens) -->
  <circle cx="220" cy="220" r="160" stroke="url(#glassGrad)" stroke-width="36" fill="white" filter="url(#shadow)"/>

  <!-- Subtle glass fill -->
  <circle cx="220" cy="220" r="142" fill="#0ea5e9" fill-opacity="0.07"/>

  <!-- Arabic letter ع inside the magnifying glass -->
  <foreignObject x="58" y="58" width="284" height="284">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
      <span style="font-family:'Diwan Thuluth','Geeza Pro','Baghdad','Al Nile',serif;font-size:200px;color:#2563eb;line-height:1;">ع</span>
    </div>
  </foreignObject>
</svg>
